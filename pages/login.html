<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your Adobisphere account to access saved events, blogs, and your creator profile.">
  <title>Sign In — Adobisphere</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/footer.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>
  <div id="navbar-root"></div>

  <main>
    <div class="login-wrapper">
      <div class="login-brand-header">
        <div class="brand-wordmark">
          <span class="brand-adobe">Adobi</span><span class="brand-ecosystem">sphere</span>
        </div>
        <h1>Welcome Back</h1>
        <p>Sign in to your Adobisphere account</p>
      </div>

      <form id="login-form" novalidate>
        <div id="login-error" role="alert" aria-live="polite"></div>

        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input id="login-email" class="form-input" type="email" autocomplete="email">
        </div>

        <div class="form-group password-wrap">
          <label for="login-password">Password</label>
          <input id="login-password" class="form-input" type="password" autocomplete="current-password">
          <button type="button" id="toggle-password" aria-label="Show password">
            <span class="eye-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </span>
          </button>
        </div>

        <button type="button" id="login-submit" class="btn btn-primary" style="width:100%">Sign In</button>

        <p class="login-bottom-link">Don't have an account? <a href="/pages/signup.html">Sign Up →</a></p>
      </form>
    </div>
  </main>

  <div id="footer-root"></div>

  <div id="login-loading" aria-hidden="true">
    <div class="spinner" aria-label="Loading"></div>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/router.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/partials.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
