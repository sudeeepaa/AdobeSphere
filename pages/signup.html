<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create an Adobesphere account to save events, follow creators, and publish your own blogs.">
  <title>Join Us — Adobesphere</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/footer.css">
  <link rel="stylesheet" href="../css/signup.css">
</head>
<body>
  <div id="navbar-root"></div>

  <main>
    <section class="signup-wrapper">
      <form id="signup-form" novalidate>
        <div class="signup-brand-header">
          <div class="brand-wordmark">
            <span class="brand-adobe">Adobi</span><span class="brand-ecosystem">sphere</span>
          </div>
          <h1>Join Adobesphere - Creative Experience Platform</h1>
          <p>Create your creator profile and get started</p>
        </div>

        <div id="signup-error" role="alert" aria-live="assertive"></div>

        <div class="form-group">
          <label class="form-label" for="signup-name">Full Name*</label>
          <input id="signup-name" class="form-input" type="text" autocomplete="name">
          <span class="form-error" data-error-for="signup-name"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="signup-designation">Designation / Role*</label>
          <input id="signup-designation" class="form-input" type="text" placeholder="Graphic Designer">
          <span class="form-error" data-error-for="signup-designation"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="signup-email">Email Address*</label>
          <input id="signup-email" class="form-input" type="email" autocomplete="email">
          <span class="form-error" data-error-for="signup-email"></span>
        </div>

        <div class="form-group password-wrap">
          <label class="form-label" for="signup-password">Password*</label>
          <input id="signup-password" class="form-input" type="password" autocomplete="new-password">
          <button type="button" class="toggle-password" data-target="signup-password" aria-label="Show password">
            <span class="eye-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </span>
          </button>
          <div id="password-strength">
            <span id="strength-bar"></span>
            <span id="strength-label"></span>
          </div>
          <span class="form-error" data-error-for="signup-password"></span>
        </div>

        <div class="form-group password-wrap">
          <label class="form-label" for="signup-confirm-password">Confirm Password*</label>
          <input id="signup-confirm-password" class="form-input" type="password" autocomplete="new-password">
          <button type="button" class="toggle-password" data-target="signup-confirm-password" aria-label="Show password">
            <span class="eye-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </span>
          </button>
          <span class="form-error" data-error-for="signup-confirm-password"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="signup-bio">About / Bio*</label>
          <textarea id="signup-bio" class="form-input" rows="4" maxlength="500"></textarea>
          <span id="bio-char-count">0 / 500 characters</span>
          <span class="form-error" data-error-for="signup-bio"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="social-linkedin">LinkedIn (optional)</label>
          <input id="social-linkedin" class="form-input" type="url" placeholder="https://linkedin.com/in/yourprofile">
          <span class="form-error" data-error-for="social-linkedin"></span>
        </div>

        <div class="form-group">
          <label class="form-label">Profile Picture (optional)</label>
          <div class="avatar-preview-wrap">
            <img id="avatar-preview" src="../assets/images/profiles/default-user.jpg" alt="Avatar Preview">
            <label for="signup-avatar" class="avatar-change-btn">Choose Photo</label>
            <input type="file" id="signup-avatar" accept=".jpg,.png,.webp,image/jpeg,image/png,image/webp">
          </div>
        </div>

        <button type="button" id="signup-submit" class="btn btn-primary" style="width:100%">Create Account</button>

        <p class="signup-bottom-link">Already have an account? <a href="/pages/login.html">Sign In →</a></p>
      </form>
    </section>
  </main>

  <div id="footer-root"></div>

  <div id="signup-loading" aria-hidden="true">
    <div class="spinner" aria-label="Loading"></div>
  </div>

  <div id="toast-container"></div>

  <script src="../js/utils.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/router.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/partials.js"></script>
  <script src="../js/signup.js"></script>
</body>
</html>
