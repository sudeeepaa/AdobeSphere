<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The page you're looking for doesn't exist on Adobesphere.">
  <meta name="robots" content="noindex">
  <title>Page Not Found — Adobesphere</title>
  <link rel="icon" type="image/png" href="/assets/images/branding/adobe-ecosystem-wordmark.png">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/navbar.css">
  <link rel="stylesheet" href="/css/footer.css">
  <style>
    #notfound {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    #notfound .notfound-code {
      font-size: clamp(5rem, 18vw, 10rem);
      line-height: 1;
      font-weight: 800;
      margin: 0;
    }
    #notfound h1 {
      margin: 0.5rem 0 0.75rem;
    }
    #notfound p {
      max-width: 32rem;
      margin: 0 auto 1.75rem;
    }
    #notfound .notfound-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>

<body>
  <div id="navbar-root"></div>

  <main>
    <section id="notfound" class="section">
      <div class="container">
        <p class="notfound-code">404</p>
        <h1>This page wandered off</h1>
        <p>The page you're looking for doesn't exist or may have moved. Let's get you back to exploring Adobe's creative universe.</p>
        <div class="notfound-actions">
          <a class="btn btn-primary" href="/index.html">Back to Home</a>
          <a class="btn btn-secondary" href="/pages/explore.html">Explore All</a>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-root"></div>
  <div id="toast-container"></div>

  <script src="/js/utils.js"></script>
  <script src="/js/storage.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/partials.js"></script>
</body>

</html>
